trigger: none

pr:
  branches:
    include:
      - main
      - master

parameters:
  - name: runWindows
    displayName: 'Run Windows Tests'
    type: boolean
    default: true
  - name: runLinux
    displayName: 'Run Linux UI Tests'
    type: boolean
    default: true
  - name: prBranch
    displayName: 'Branch to test (e.g. master, feature/my-branch). Ignored if prNumber is set.'
    type: string
    default: 'master'
  - name: prNumber
    displayName: 'PR number to test (e.g. 54). Leave empty to use prBranch.'
    type: string
    default: ''

resources:
  repositories:
    - repository: externalRepo
      type: github
      name: v-jiaodi/TypespecAutomation
      endpoint: jiao_pat
      ref: ${{ coalesce(variables['System.PullRequest.SourceBranch'], variables['Build.SourceBranch'], 'refs/heads/master') }}

stages:
  - stage: WindowsTests
    condition: eq('${{ parameters.runWindows }}', true)
    jobs:
      - template: windows-tests-stage.yml

  - stage: LinuxTests
    dependsOn: []
    condition: eq('${{ parameters.runLinux }}', true)
    jobs:
      - template: linux-tests-stage.yml
