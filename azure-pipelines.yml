trigger:
  branches:
    include:
      - master

pr:
  branches:
    include:
      - master

parameters:
  - name: runWindows
    displayName: 'Run Windows Tests'
    type: boolean
    default: true
  - name: runLinux
    displayName: 'Run Linux UI Tests'
    type: boolean
    default: true
  - name: prBranch
    displayName: 'Branch to test (e.g. master, feature/my-branch). Ignored if prNumber is set.'
    type: string
    default: 'master'
  - name: prNumber
    displayName: 'PR number to test (e.g. 54). Leave empty to use prBranch.'
    type: string
    default: ''

resources:
  repositories:
    - repository: externalRepo
      type: github
      name: v-jiaodi/TypespecAutomation
      endpoint: jiao_pat
      ref: ${{ if ne(parameters.prNumber, '') }}refs/pull/${{ parameters.prNumber }}/head${{ else }}${{ parameters.prBranch }}${{ endif }}

stages:
  - stage: WindowsTests
    condition: eq('${{ parameters.runWindows }}', true)
    jobs:
      - template: windows-tests-stage.yml

  - stage: LinuxTests
    dependsOn: []
    condition: eq('${{ parameters.runLinux }}', true)
    jobs:
      - template: linux-tests-stage.yml
